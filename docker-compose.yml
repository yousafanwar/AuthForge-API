services:
  postgres:
    image: postgres:16-alpine
    container_name: authforge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data persists across restarts
    ports:
      - "5432:5432"   # remove this line if you don't need external DB access

  app:
    build: .
    container_name: authforge-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres   # ensures postgres starts first

volumes:
  postgres_data: